# This is a Databricks asset bundle definition for test.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: test
  uuid: bc58d92b-79e4-4c43-927d-4f27815db76d

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-777862349969176.16.azuredatabricks.net
    variables:
      catalog: dev
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-777862349969176.16.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/bhuvanachandra.b@simbustech.com to make sure we only have a single copy.
      root_path: /Workspace/Users/bhuvanachandra.b@simbustech.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dev
      schema: prod
    permissions:
      - user_name: bhuvanachandra.b@simbustech.com
        level: CAN_MANAGE
