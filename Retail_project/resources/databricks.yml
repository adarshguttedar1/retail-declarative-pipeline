bundle:
  name: retail-declarative-pipeline

targets:
  dev:
    workspace:
      host: https://<your-workspace>.azuredatabricks.net

resources:
  jobs:
    retail_orchestration_job:
      name: Retail_Medallion_Pipeline
      schedule:
        quartz_cron_expression: "0 0 2 * * ?" # Runs daily at 2:00 AM
        timezone_id: "UTC"
      job_clusters:
        - job_cluster_key: standard_compute
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_D4ds_v5
            num_workers: 2
            spark_conf:
              spark.databricks.delta.optimizeWrite.enabled: "true"
              spark.databricks.delta.autoCompact.enabled: "true"
      
      tasks:
        # Task 1: Ingest Bronze
        - task_key: run_bronze
          job_cluster_key: standard_compute
          spark_python_task:
            python_file: src/bronze/ingest_bronze.py
            parameters: ["resources/retail_pipeline.json"]

        # Task 2: Process Silver (Waits for Bronze)
        - task_key: run_silver
          depends_on:
            - task_key: run_bronze
          job_cluster_key: standard_compute
          spark_python_task:
            python_file: src/silver/process_silver.py
            parameters: ["resources/retail_pipeline.json"]

        # Task 3: Aggregate Gold (Waits for Silver)
        - task_key: run_gold
          depends_on:
            - task_key: run_silver
          job_cluster_key: standard_compute
          spark_python_task:
            python_file: src/gold/aggregate_gold.py
            parameters: ["resources/retail_pipeline.json"]