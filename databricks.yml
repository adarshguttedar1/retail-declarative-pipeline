bundle:
  name: retail_project_v3

# The Enterprise Standard: Explicitly defining targets and infrastructure permissions
targets:
  default:
    default: true
    workspace:
      root_path: /Shared/deployments/.bundle/${bundle.name}/${bundle.environment}
    permissions:
      - level: CAN_MANAGE
        group_name: users

resources:
  jobs:
    retail_medallion_pipeline:
      name: "Retail Medallion Pipeline"
      
      schedule:
        quartz_cron_expression: "0 0 0 * * ?" 
        timezone_id: "UTC"

      tasks:
        - task_key: bronze_ingestion
          spark_python_task:
            python_file: ./src/Bronze.py
            parameters: 
              - ./resources/retail_pipeline.yml
          job_cluster_key: serverless_compute
            
        - task_key: silver_processing
          depends_on:
            - task_key: bronze_ingestion
          spark_python_task:
            python_file: ./src/Silver.py
            parameters: 
              - ./resources/retail_pipeline.yml
          job_cluster_key: serverless_compute

        - task_key: gold_aggregation
          depends_on:
            - task_key: silver_processing
          sql_task:
            file:
              path: ./src/Gold.sql
            warehouse_id: ${resources.sql_warehouses.gold_serverless_warehouse.id}

      job_clusters:
        - job_cluster_key: serverless_compute
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2 

  sql_warehouses:
    gold_serverless_warehouse:
      name: "Gold_Pipeline_Serverless"
      cluster_size: "2X-Small"
      enable_serverless_compute: true
      auto_stop_mins: 10