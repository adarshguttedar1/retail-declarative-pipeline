bundle:
  name: retail_project

# This ensures your code is uploaded to the workspace before the job runs
workspace:
  root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.environment}

resources:
  jobs:
    retail_medallion_pipeline:
      name: "Retail Medallion Pipeline (Serverless)"
      
      # Step 1: Run the Bronze Ingestion
      tasks:
        - task_key: bronze_ingestion
          spark_python_task:
            python_file: ./src/bronze/ingest_bronze.py
            parameters: 
              - ./resources/retail_pipeline.yml
          # Using Serverless Compute for the job
          compute:
            job_cluster_key: serverless_compute
            
        # Step 2: Run Silver (Only starts if Bronze succeeds)
        - task_key: silver_processing
          depends_on:
            - task_key: bronze_ingestion
          spark_python_task:
            python_file: ./src/silver/process_silver.py
            parameters: 
              - ./resources/retail_pipeline.yml
          compute:
            job_cluster_key: serverless_compute

        # Step 3: Run Gold (Only starts if Silver succeeds)
        - task_key: gold_aggregation
          depends_on:
            - task_key: silver_processing
          spark_python_task:
            python_file: ./src/gold/process_gold.py
            parameters: 
              - ./resources/retail_pipeline.yml
          compute:
            job_cluster_key: serverless_compute

      # Define the Serverless compute cluster for the job
      job_clusters:
        - job_cluster_key: serverless_compute
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2 
            # Note: Depending on your exact Databricks tier, native Serverless Job 
            # syntax might just require omitting the 'job_clusters' block entirely. 
            # If this cluster fails to deploy, remove the job_clusters block.